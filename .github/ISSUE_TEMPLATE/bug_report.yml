name: Bug Report
description: Report a bug or unexpected behavior in a platform package
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: package
    attributes:
      label: Affected Package
      description: Which NuGet package is affected?
      placeholder: "e.g. MarcusPrado.Platform.EfCore"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET SDK Version
      description: Output of `dotnet --version`
      placeholder: "e.g. 10.0.103"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps that reproduce the issue.
      render: csharp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include the full exception message and stack trace if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, configuration, environment details, or anything else relevant.
