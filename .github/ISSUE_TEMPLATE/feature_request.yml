name: Feature Request
description: Propose a new package, API, or improvement to the platform
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check the [BACKLOG.md](../../BACKLOG.md) and open issues to avoid duplicates.

  - type: input
    id: package
    attributes:
      label: Package or Area
      description: Which package or area of the platform is this about?
      placeholder: "e.g. MarcusPrado.Platform.Messaging, or 'new package'"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? What friction exists today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed API, behavior, or approach. Code examples welcome.
      render: csharp

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider, and why did you rule them out?

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New package / adapter
        - New API on existing package
        - Breaking change to existing API
        - Performance improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, prior art, related ADRs, or anything else relevant.
