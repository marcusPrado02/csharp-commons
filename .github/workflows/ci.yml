# ──────────────────────────────────────────────────────────────────────────────
# CI pipeline — MarcusPrado Platform Commons
#
# Stages
#   build    → restore + compile (gate for all downstream jobs)
#   test     → unit tests + XPlat Code Coverage → Codecov
#   analyze  → dotnet format --verify-no-changes + CSharpier check
#   pack     → NuGet packages for core + extensions + kits (main & v* tags)
#   publish  → push packages to GitHub Packages (v* tags only)
#   release  → create GitHub Release with auto-generated changelog (v* tags only)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Minimal default permissions — each job that needs more declares its own.
permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  # Redirect NuGet cache so actions/cache can cache it between jobs
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. BUILD
  #    Restore NuGet packages and compile the entire solution in Release mode.
  #    All downstream jobs depend on this succeeding first.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

  # ────────────────────────────────────────────────────────────────────────────
  # 2. TEST
  #    Run all unit tests, collect XPlat Code Coverage, upload results to
  #    Codecov and store the TRX report as a workflow artefact.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          dotnet test --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./coverage/**/*.trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ────────────────────────────────────────────────────────────────────────────
  # 3. ANALYZE
  #    a) dotnet format  — verifies Roslyn code-style rules from .editorconfig
  #       without modifying any files (fails if files would change)
  #    b) CSharpier check — verifies formatter output matches committed code
  # ────────────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        # dotnet format needs a successful build to evaluate IDE-level rules
        run: dotnet build --no-restore -c Release

      - name: Restore .NET tools
        # Installs tools listed in .config/dotnet-tools.json (e.g. CSharpier)
        run: dotnet tool restore

      - name: dotnet format — Roslyn style check
        run: dotnet format --verify-no-changes --severity error

      - name: CSharpier — formatter check
        run: dotnet csharpier check .

      # Audit NuGet dependencies for known CVEs (built-in .NET 8+ command).
      # Non-blocking (--severity moderate exits non-zero for moderate+ CVEs).
      # Set fail_on_vuln: true below once a clean baseline is established.
      - name: NuGet security audit
        run: dotnet nuget audit --severity moderate

  # ────────────────────────────────────────────────────────────────────────────
  # 4. PACK
  #    Build NuGet packages for all shippable libraries.
  #    Runs only on pushes (not PRs) and only when test + analyze both pass.
  #
  #    Version strategy (MinVer reads from git tags automatically):
  #      - On a v* tag  → strip the leading 'v'  (e.g. v1.2.3 → 1.2.3)
  #      - On main push → 0.0.0-preview.<run_number>  (pre-release for testing)
  # ────────────────────────────────────────────────────────────────────────────
  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: [test, analyze]
    if: github.event_name == 'push'

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history lets MinVer and version-from-tag strategies work
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Determine package version
        id: version
        env:
          GIT_REF: ${{ github.ref }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-preview.$RUN_NUMBER"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging version: $VERSION"

      - name: Pack — core libraries
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          find src/core -name '*.csproj' | while read proj; do
            dotnet pack "$proj" --no-build -c Release \
              -p:PackageVersion="$PACKAGE_VERSION" \
              --output ./nupkgs
          done

      - name: Pack — extension libraries
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          find src/extensions -name '*.csproj' | while read proj; do
            dotnet pack "$proj" --no-build -c Release \
              -p:PackageVersion="$PACKAGE_VERSION" \
              --output ./nupkgs
          done

      - name: Pack — kit libraries
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          find src/kits -name '*.csproj' | while read proj; do
            dotnet pack "$proj" --no-build -c Release \
              -p:PackageVersion="$PACKAGE_VERSION" \
              --output ./nupkgs
          done

      - name: List packages
        run: ls -lh ./nupkgs/

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ steps.version.outputs.version }}
          path: ./nupkgs/*.nupkg
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # 5. PUBLISH
  #    Push all NuGet packages to GitHub Packages.
  #    Triggered only when the pipeline runs on a v* tag.
  #
  #    Authentication uses actions/setup-dotnet source-url + NUGET_AUTH_TOKEN
  #    (GITHUB_TOKEN) — the officially recommended approach; avoids the
  #    fragile `dotnet nuget add source` pattern.
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: nuget-production
      url: https://github.com/${{ github.repository_owner }}?tab=packages

    # Override the workflow-level read-only permissions.
    # packages: write  → required to push to GitHub Packages
    # id-token: write  → OIDC (future: trusted signing / attestation)
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs-${{ needs.pack.outputs.version }}
          path: ./nupkgs

      # Setup .NET and authenticate to GitHub Packages in one step.
      # source-url + NUGET_AUTH_TOKEN is the canonical approach recommended by
      # GitHub Actions documentation for NuGet package registry authentication.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --source "https://nuget.pkg.github.com/$REPO_OWNER/index.json" \
            --skip-duplicate

  # ────────────────────────────────────────────────────────────────────────────
  # 6. RELEASE
  #    Create a GitHub Release with auto-generated release notes (git-cliff)
  #    and attach the NuGet packages as release assets.
  #    Runs after publish so packages are already in the registries when the
  #    release announcement goes live.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [pack, publish]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs-${{ needs.pack.outputs.version }}
          path: ./nupkgs

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        id: cliff
        run: |
          git cliff --current --strip header -o RELEASE_NOTES.md
          echo "notes_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.cliff.outputs.notes_path }}
          files: ./nupkgs/*.nupkg
