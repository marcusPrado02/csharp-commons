# ──────────────────────────────────────────────────────────────────────────────
# Mutation Testing — MarcusPrado Platform Commons
#
# This workflow is triggered manually (workflow_dispatch) only.
# It is non-blocking: failures here do not block merges or releases.
#
# It runs Stryker on a chosen core project and uploads the HTML report as a
# workflow artifact for review.
# ──────────────────────────────────────────────────────────────────────────────

name: Mutation Testing

on:
  # Manual trigger — target a specific project.
  workflow_dispatch:
    inputs:
      project:
        description: 'Core project to test (subfolder of src/core/)'
        required: false
        default: 'MarcusPrado.Platform.Abstractions'

  # Weekly automated run every Monday at 03:00 UTC on the default project.
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  mutation:
    name: Mutation Tests
    runs-on: ubuntu-latest
    # Non-blocking: the workflow result does not gate any other workflow
    continue-on-error: true

    env:
      # Resolve the project name once, using a safe env variable
      PROJECT_NAME: ${{ github.event.inputs.project || 'MarcusPrado.Platform.Abstractions' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Install dotnet-stryker
        run: dotnet tool install -g dotnet-stryker || true

      - name: Run Stryker
        run: |
          cd "src/core/${PROJECT_NAME}"
          dotnet stryker
        # continue-on-error so the artifact upload step always runs
        continue-on-error: true

      - name: Upload HTML mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: src/core/${{ env.PROJECT_NAME }}/StrykerOutput/**/mutation-report.html
          if-no-files-found: warn
