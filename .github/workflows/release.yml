name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (full history required by MinVer and git-cliff) ──────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── .NET SDK ──────────────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Restore ───────────────────────────────────────────────────────────
      - name: Restore packages
        run: dotnet restore

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build --no-restore -c Release

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      # ── Pack (MinVer derives version from the pushed tag automatically) ───
      - name: Pack
        run: dotnet pack --no-build -c Release --output ./artifacts

      # ── Generate CHANGELOG with git-cliff ─────────────────────────────────
      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        id: cliff
        run: |
          git cliff --current --strip header -o RELEASE_NOTES.md
          echo "notes_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.cliff.outputs.notes_path }}
          files: ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Push to NuGet.org ─────────────────────────────────────────────────
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ── Push to GitHub Packages ───────────────────────────────────────────
      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          dotnet nuget add source \
            --username "$REPO_OWNER" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${REPO_OWNER}/index.json" || true
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --source github \
            --skip-duplicate
